<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3A6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2A5298;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
  <rect width="400" height="260" fill="url(#bg)" rx="8"/>
  <rect width="400" height="260" fill="url(#shine)" rx="8"/>
  <!-- Grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="52" x2="400" y2="52" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="104" x2="400" y2="104" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="156" x2="400" y2="156" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="208" x2="400" y2="208" stroke="#fff" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="260" stroke="#fff" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="260" stroke="#fff" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="260" stroke="#fff" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="260" stroke="#fff" stroke-width="1"/>
  </g>
  <!-- Camera body -->
  <rect x="152" y="98" width="96" height="72" rx="10" fill="none" stroke="#C8D6EC" stroke-width="2.5"/>
  <!-- Lens circle -->
  <circle cx="200" cy="134" r="22" fill="none" stroke="#C8D6EC" stroke-width="2.5"/>
  <circle cx="200" cy="134" r="13" fill="none" stroke="#C8D6EC" stroke-width="1.5" opacity="0.6"/>
  <circle cx="200" cy="134" r="5" fill="#C8D6EC" opacity="0.5"/>
  <!-- Viewfinder bump -->
  <rect x="186" y="91" width="28" height="10" rx="4" fill="none" stroke="#C8D6EC" stroke-width="2"/>
  <!-- Flash dot -->
  <circle cx="163" cy="105" r="4" fill="#C8D6EC" opacity="0.7"/>
  <!-- Text -->
  <text x="200" y="192" text-anchor="middle" font-family="'Lato', sans-serif" font-size="13" font-weight="600" fill="#C8D6EC" letter-spacing="2" opacity="0.9">ROOM PHOTO</text>
  <text x="200" y="210" text-anchor="middle" font-family="'Lato', sans-serif" font-size="10" fill="#C8D6EC" letter-spacing="1" opacity="0.55">RAJ PG SERVICES</text>
</svg>
